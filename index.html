<!DOCTYPE html>
<html>
<head>
<title>Classified Mission</title>

<style>
  body {
    background: black;
    color: #03A062;
    font-family: monospace;
    text-align: center;
    margin-top: 100px;
    font-size: 40px;
    overflow: hidden;
  }

  h1 {
    font-size: 60px;
  }

  .blink {
    animation: blink 1s infinite;
  }

  @keyframes blink {
    50% { opacity: 0.5; }
  }

  #timer {
    font-size: 80px;
    margin-top: 20px;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
  }

  .deleted-text {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    color: red;
    font-size: 50px;
    text-shadow: 0 0 15px red;
  }
</style>

</head>
<body>

<h1 class="blink">CLASSIFIED MESSAGE</h1>

<p id="typing"></p>
<p id="line2" style="display:none;">Join us on the 27th of April, 2026 for Ishaan's 14th Birthday</p>
<p id="line3" style="display:none;">Reach the safe house before 6:00 PM (202, SBI Executive Enclave)</p>
<p id="line4" style="display:none;">You will receive further intel upon arrival</p>
<p id="line5" style="display:none;">This message will self destruct in 1 minute</p>

<h2 id="timer">60</h2>

<script>
// TYPING EFFECT
const text = "Your mission, should you choose to accept it:";
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("typing").innerHTML += text.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  } else {
    // reveal remaining lines after typing
    document.getElementById("line2").style.display = "block";
    document.getElementById("line3").style.display = "block";
    document.getElementById("line4").style.display = "block";
    document.getElementById("line5").style.display = "block";
  }
}

typeEffect();


// COUNTDOWN
let time = 60;
let timer = document.getElementById("timer");

let countdown = setInterval(() => {
  time--;
  timer.innerText = time;

  // turn red in last 10 seconds
  if (time <= 10) {
    timer.style.color = "red";
  }

  if (time <= 0) {
    clearInterval(countdown);
    startMatrix();
  }
}, 1000);


// MATRIX EFFECT FUNCTION
function startMatrix() {
  document.body.innerHTML = `
    <canvas id="matrix"></canvas>
    <div class="deleted-text">💣 MESSAGE DELETED 💣</div>
  `;

  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  const fontSize = 16;
  const columns = canvas.width / fontSize;

  const drops = [];
  for (let x = 0; x < columns; x++) {
    drops[x] = 1;
  }

  function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }

      drops[i]++;
    }
  }

  setInterval(draw, 33);
}
</script>

</body>
</html>
