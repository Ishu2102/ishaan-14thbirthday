<!DOCTYPE html>
<html>
<head>
<title>Classified Mission</title>
<style>
  body {
    background: black;
    color: #03A062;
    font-family: monospace;
    text-align: center;
    margin-top: 100px;
    font-size: 40px;
  }
</style>
</head>
<body>

<h1>CLASSIFIED MESSAGE</h1>
<p id="msg">Your mission, should you choose to accept it:</p>
<p id="msg">Join us on the 27th of April, 2026</p>
<p id="msg">The mission begins at 6:00 PM</p>
<p id="msg">This message will self destruct in 1 minute</p>
<h2 id="timer">60</h2>

<script>
  
let time = 60;
let timer = document.getElementById("timer");

let countdown = setInterval(() => {
  time--;
  timer.innerText = time;

  if (time <= 0) {
    clearInterval(countdown);
    document.body.innerHTML = "<h1>MESSAGE DELETED</h1>";
  }
}, 1000);
</script>
