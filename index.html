<!DOCTYPE html>
<html>
<head>
<title>Classified Mission</title>

<style>
  body {
    background: black;
    color: #03A062;
    font-family: monospace;
    text-align: center;
    margin-top: 50px;
    font-size: 40px;
    overflow-y: auto;
  }

  h1 {
    font-size: 60px;
  }

  .blink {
    animation: blink 1s infinite;
  }

  @keyframes blink {
    50% { opacity: 0.5; }
  }

  #timer {
    font-size: 80px;
    margin-top: 20px;
  }

  canvas {
    display: block;
    margin: 0 auto;
  }

  #logoCanvas {
    margin-bottom: 30px;
    filter: drop-shadow(0 0 10px #03A062);
  }

  .deleted-text {
    position: absolute;
    top: 40%;
    width: 100%;
    text-align: center;
    color: red;
    font-size: 50px;
    text-shadow: 0 0 15px red;
  }

  #typing::after {
    content: "|";
    animation: blink 1s infinite;
  }
</style>

</head>
<body>

<h1 class="blink">CLASSIFIED MESSAGE</h1>

<!-- IMF LOGO -->
<canvas id="logoCanvas"></canvas>

<p id="typing"></p>

<h2 id="timer">60</h2>

<script>
// ================= LOGO MATRIX DOT =================
function drawMatrixLogo() {
  const canvas = document.getElementById("logoCanvas");
  const ctx = canvas.getContext("2d");

  const img = new Image();
  img.src = "logo.png"; // make sure this file exists

  img.onload = function () {
    const width = 300;
    const height = 300;

    canvas.width = width;
    canvas.height = height;

    ctx.drawImage(img, 0, 0, width, height);

    const imageData = ctx.getImageData(0, 0, width, height);
    ctx.clearRect(0, 0, width, height);

    const gap = 6;

    for (let y = 0; y < height; y += gap) {
      for (let x = 0; x < width; x += gap) {
        const index = (y * width + x) * 4;
        const r = imageData.data[index];
        const g = imageData.data[index + 1];
        const b = imageData.data[index + 2];

        const brightness = (r + g + b) / 3;

        if (brightness > 80) {
          ctx.fillStyle = "#03A062";
          ctx.beginPath();
          ctx.arc(x, y, 2, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }
  };
}

drawMatrixLogo();


// ================= TYPING EFFECT =================
const lines = [
  "Your mission, should you choose to accept it:",
  "Join us on the 27th of April, 2026 for Ishaan's 14th Birthday",
  "Reach the safe house before 6:00 PM (202, SBI Executive Enclave)",
  "You will receive further intel upon arrival",
  "This message will self destruct in 1 minute"
];

let lineIndex = 0;
let charIndex = 0;
const speed = 40;

function typeLines() {
  if (lineIndex < lines.length) {
    let currentLine = lines[lineIndex];

    if (charIndex < currentLine.length) {
      document.getElementById("typing").innerHTML += currentLine.charAt(charIndex);
      charIndex++;
      window.scrollTo(0, document.body.scrollHeight);
      setTimeout(typeLines, speed);
    } else {
      document.getElementById("typing").innerHTML += "<br><br>";
      lineIndex++;
      charIndex = 0;
      setTimeout(typeLines, 400);
    }
  }
}

typeLines();


// ================= COUNTDOWN =================
let time = 60;
let timer = document.getElementById("timer");

let countdown = setInterval(() => {
  time--;
  timer.innerText = time;

  if (time <= 10) {
    timer.style.color = "red";
  }

  if (time <= 0) {
    clearInterval(countdown);
    startMatrix();
  }
}, 1000);


// ================= MATRIX DELETE =================
function startMatrix() {
  document.body.innerHTML = `
    <canvas id="matrix"></canvas>
    <div class="deleted-text">MESSAGE DELETED</div>
  `;

  const canvas = document.getElementById("matrix");
  const ctx = canvas.getContext("2d");

  canvas.height = window.innerHeight;
  canvas.width = window.innerWidth;

  const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
  const fontSize = 16;
  const columns = canvas.width / fontSize;

  const drops = [];
  for (let x = 0; x < columns; x++) drops[x] = 1;

  function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#0F0";
    ctx.font = fontSize + "px monospace";

    for (let i = 0; i < drops.length; i++) {
      const text = letters[Math.floor(Math.random() * letters.length)];
      ctx.fillText(text, i * fontSize, drops[i] * fontSize);

      if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
        drops[i] = 0;
      }

      drops[i]++;
    }
  }

  setInterval(draw, 33);
}
</script>

</body>
</html>
